<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星座运势 - 观星象 · 知吉凶 · 顺天时</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#080810;--bg-secondary:#0c0c1a;
--bg-card:rgba(16,16,32,0.75);--bg-card-hover:rgba(24,24,48,0.85);
--gold:#D4AF37;--gold-light:#F0D68A;--gold-dim:#8B7D3C;--gold-dark:#a08040;--gold-glow:rgba(212,175,55,0.35);
--purple:#6B4C9A;--purple-light:#9B7ED8;--purple-dim:rgba(107,76,154,0.3);
--text:#F5F0E8;--text-dim:#A09880;--text-bright:#fff8e8;--text-muted:#706858;
--border:rgba(212,175,55,0.18);--shadow:0 8px 32px rgba(0,0,0,0.6);
--glass:rgba(16,16,36,0.65);--glass-border:rgba(212,175,55,0.12);
--fire:#E25822;--earth:#8B6914;--air:#4A90D9;--water:#2E8B8B;
--radius:16px;--radius-sm:10px;--radius-xs:6px;
}
@font-face{font-family:'kai';src:local('KaiTi'),local('楷体'),local('STKaiti')}
html{scroll-behavior:smooth}
body{
font-family:'Microsoft YaHei','PingFang SC','Hiragino Sans GB',sans-serif;
background:var(--bg-primary);color:var(--text);
min-height:100vh;line-height:1.8;font-size:15px;
overflow-x:hidden;
}

/* Canvas for star animation */
#starCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* Noise overlay */
body::before{
content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
opacity:0.025;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.container{max-width:480px;margin:0 auto;padding:12px 16px;position:relative;z-index:1}

/* Back nav */
.back-nav{padding:8px 0}
.back-nav a{
color:var(--gold-dim);text-decoration:none;font-size:0.9em;letter-spacing:1px;
transition:color 0.3s;display:inline-flex;align-items:center;gap:6px;
}
.back-nav a:hover{color:var(--gold)}

/* Header */
.header{text-align:center;padding:20px 0 12px}
.header .icon{font-size:2.4em;display:block;margin-bottom:2px;filter:drop-shadow(0 0 16px rgba(212,175,55,0.5))}
.header h1{
font-family:'kai',serif;font-size:2.1em;color:var(--gold);letter-spacing:10px;
text-shadow:0 0 30px rgba(212,175,55,0.3);font-weight:normal;
}
.header .sub{color:var(--text-dim);font-size:0.82em;letter-spacing:4px;margin-top:2px}

/* Date bar */
.date-bar{
text-align:center;padding:10px 16px;margin:8px 0 16px;
background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-sm);
backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
font-size:0.85em;color:var(--text-dim);letter-spacing:1px;
}
.date-bar .lunar{color:var(--gold-dim);margin-left:8px}

.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:16px 0}
.divider-subtle{height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.1),transparent);margin:12px 0}

/* Section titles */
.section-title{
font-family:'kai',serif;font-size:1.25em;color:var(--gold);text-align:center;
letter-spacing:5px;margin:20px 0 14px;position:relative;
}
.section-title::before,.section-title::after{
content:'';position:absolute;top:50%;height:1px;width:40px;
background:linear-gradient(90deg,transparent,var(--gold-dim));
}
.section-title::before{right:calc(50% + 4.5em);transform:scaleX(-1)}
.section-title::after{left:calc(50% + 4.5em)}

/* Glass card base */
.glass-card{
background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);
backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
padding:16px;margin-bottom:14px;
transition:all 0.3s ease;
}
.glass-card:hover{border-color:rgba(212,175,55,0.25)}

/* Today rankings */
.ranking-list{display:flex;flex-direction:column;gap:6px}
.rank-item{
display:flex;align-items:center;gap:10px;padding:10px 12px;
background:rgba(255,255,255,0.02);border-radius:var(--radius-sm);
border:1px solid transparent;transition:all 0.3s;cursor:pointer;
}
.rank-item:hover{background:rgba(212,175,55,0.06);border-color:var(--border)}
.rank-item.top1{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.2)}
.rank-item.top2{background:rgba(192,192,192,0.06);border-color:rgba(192,192,192,0.15)}
.rank-item.top3{background:rgba(205,127,50,0.06);border-color:rgba(205,127,50,0.15)}
.rank-num{
width:26px;height:26px;display:flex;align-items:center;justify-content:center;
border-radius:50%;font-size:0.75em;font-weight:bold;flex-shrink:0;
background:rgba(255,255,255,0.05);color:var(--text-dim);
}
.top1 .rank-num{background:linear-gradient(135deg,#FFD700,#FFA500);color:#1a1a2e;font-size:0.85em}
.top2 .rank-num{background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:#1a1a2e}
.top3 .rank-num{background:linear-gradient(135deg,#CD7F32,#B8860B);color:#1a1a2e}
.rank-emoji{font-size:1.5em;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:0.92em;color:var(--text-bright);font-weight:bold}
.rank-stars{color:var(--gold);font-size:0.8em;margin-left:6px}
.rank-summary{font-size:0.78em;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-score{
font-size:0.85em;font-weight:bold;color:var(--gold);flex-shrink:0;
min-width:36px;text-align:right;
}

/* Zodiac grid */
.zodiac-grid{
display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;
}
.zodiac-btn{
display:flex;flex-direction:column;align-items:center;gap:2px;
padding:14px 4px 10px;border-radius:var(--radius-sm);
background:var(--glass);border:1.5px solid var(--glass-border);
cursor:pointer;transition:all 0.35s ease;
}
.zodiac-btn:hover{
background:rgba(212,175,55,0.08);border-color:var(--gold-dim);
transform:translateY(-2px);
}
.zodiac-btn.active{
background:rgba(212,175,55,0.12);border-color:var(--gold);
box-shadow:0 0 20px rgba(212,175,55,0.15),inset 0 0 20px rgba(212,175,55,0.05);
}
.zodiac-btn .emoji{font-size:1.6em;filter:drop-shadow(0 0 4px rgba(255,255,255,0.1))}
.zodiac-btn .name{font-size:0.82em;color:var(--text-dim);letter-spacing:2px;margin-top:2px}
.zodiac-btn .dates{font-size:0.6em;color:var(--text-muted)}
.zodiac-btn.active .name{color:var(--gold)}

/* Sign profile card */
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.profile-emoji{font-size:3.2em;filter:drop-shadow(0 0 12px rgba(212,175,55,0.3))}
.profile-meta h2{font-family:'kai',serif;font-size:1.5em;color:var(--gold);letter-spacing:4px;font-weight:normal}
.profile-meta .symbol{color:var(--text-dim);font-size:0.85em;margin-top:2px}

.badge{
display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.75em;
letter-spacing:1px;margin:2px 4px 2px 0;
}
.badge-fire{background:rgba(226,88,34,0.2);color:#ff7b4a;border:1px solid rgba(226,88,34,0.3)}
.badge-earth{background:rgba(139,105,20,0.2);color:#c4a84a;border:1px solid rgba(139,105,20,0.3)}
.badge-air{background:rgba(74,144,217,0.2);color:#6db3ff;border:1px solid rgba(74,144,217,0.3)}
.badge-water{background:rgba(46,139,139,0.2);color:#4ac4c4;border:1px solid rgba(46,139,139,0.3)}

.attr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
.attr-item{
padding:8px 10px;background:rgba(255,255,255,0.02);border-radius:var(--radius-xs);
border:1px solid rgba(255,255,255,0.04);
}
.attr-label{font-size:0.72em;color:var(--text-muted);letter-spacing:1px}
.attr-value{font-size:0.88em;color:var(--text-bright);margin-top:1px}

.trait-tags{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.trait-tag{
padding:4px 12px;border-radius:20px;font-size:0.78em;
background:rgba(212,175,55,0.08);border:1px solid var(--border);color:var(--gold-light);
letter-spacing:1px;
}

/* Content sections */
.content-block{margin:14px 0}
.content-block h3{
font-family:'kai',serif;font-size:1.05em;color:var(--gold);
letter-spacing:3px;margin-bottom:8px;font-weight:normal;
display:flex;align-items:center;gap:8px;
}
.content-block p{
font-size:0.9em;line-height:2;color:var(--text);text-indent:2em;margin-bottom:8px;
}
.content-block p.no-indent{text-indent:0}

/* Compatibility */
.compat-item{
display:flex;align-items:center;gap:10px;padding:10px;margin:6px 0;
background:rgba(255,255,255,0.02);border-radius:var(--radius-xs);
border:1px solid rgba(255,255,255,0.03);
}
.compat-icon{font-size:1.4em;flex-shrink:0}
.compat-sign{font-size:0.9em;color:var(--gold-light);font-weight:bold;min-width:50px}
.compat-reason{font-size:0.82em;color:var(--text-dim);flex:1}

/* Paywall */
.paywall-wrap{position:relative;overflow:hidden;border-radius:var(--radius)}
.paywall-content{filter:blur(8px);pointer-events:none;user-select:none;-webkit-user-select:none}
.paywall-overlay{
position:absolute;top:0;left:0;right:0;bottom:0;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:rgba(8,8,16,0.5);z-index:2;padding:20px;text-align:center;
}
.paywall-icon{font-size:2.5em;margin-bottom:8px;filter:drop-shadow(0 0 12px rgba(212,175,55,0.4))}
.paywall-text{color:var(--text);font-size:0.92em;letter-spacing:1px;margin-bottom:4px}
.paywall-sub{color:var(--text-dim);font-size:0.78em;margin-bottom:14px}
.paywall-btn{
display:inline-block;padding:12px 32px;border-radius:30px;
background:linear-gradient(135deg,var(--gold),var(--gold-dark));
color:#1a1a2e;font-size:0.95em;font-weight:bold;letter-spacing:2px;
cursor:pointer;border:none;transition:all 0.3s;
box-shadow:0 4px 20px rgba(212,175,55,0.3);
}
.paywall-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(212,175,55,0.4)}
.paywall-hint{color:var(--text-muted);font-size:0.72em;margin-top:8px}

/* Fortune tabs */
.fortune-tabs{
display:flex;gap:0;margin:16px 0 14px;border-radius:var(--radius-sm);overflow:hidden;
border:1px solid var(--glass-border);
}
.fortune-tab{
flex:1;padding:10px 4px;text-align:center;font-size:0.82em;
background:var(--glass);color:var(--text-dim);cursor:pointer;
border-right:1px solid var(--glass-border);transition:all 0.3s;
letter-spacing:1px;position:relative;
}
.fortune-tab:last-child{border-right:none}
.fortune-tab:hover{background:rgba(212,175,55,0.06);color:var(--text)}
.fortune-tab.active{
background:rgba(212,175,55,0.12);color:var(--gold);font-weight:bold;
}
.fortune-tab .lock{font-size:0.75em;vertical-align:super}

/* Star display */
.star-display{text-align:center;margin:14px 0}
.star-display .big-stars{font-size:1.8em;color:var(--gold);letter-spacing:4px}
.star-display .score-text{font-size:0.85em;color:var(--text-dim);margin-top:4px}

/* Dimension cards */
.dim-card{
padding:14px;margin:10px 0;background:rgba(255,255,255,0.02);
border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.04);
}
.dim-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dim-icon{font-size:1.3em}
.dim-name{font-size:0.95em;color:var(--gold-light);font-weight:bold;letter-spacing:2px}
.dim-stars{margin-left:auto;color:var(--gold);font-size:0.85em}
.dim-text{font-size:0.88em;color:var(--text);line-height:1.9}
.dim-tip{
margin-top:8px;padding:8px 12px;background:rgba(212,175,55,0.06);
border-left:2px solid var(--gold-dim);border-radius:0 var(--radius-xs) var(--radius-xs) 0;
font-size:0.82em;color:var(--gold-light);
}

/* Power days */
.day-item{
display:flex;gap:10px;padding:10px;margin:6px 0;
background:rgba(255,255,255,0.02);border-radius:var(--radius-xs);
}
.day-date{
min-width:44px;text-align:center;font-size:0.82em;font-weight:bold;
color:var(--gold);flex-shrink:0;
}
.day-desc{font-size:0.85em;color:var(--text);line-height:1.7}

/* Moon phase */
.moon-display{text-align:center;margin:12px 0}
.moon-icon{font-size:3em;filter:drop-shadow(0 0 12px rgba(200,200,255,0.3))}
.moon-name{font-size:1em;color:var(--gold-light);margin-top:4px;letter-spacing:3px}

/* Footer */
.footer{text-align:center;padding:24px 0 32px;font-size:0.78em;color:var(--text-muted)}
.footer a{color:var(--gold-dim);text-decoration:none}
.footer a:hover{color:var(--gold)}
.footer p{margin:4px 0;letter-spacing:1px}

/* Animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 8px rgba(212,175,55,0.1)}50%{box-shadow:0 0 20px rgba(212,175,55,0.25)}}
.anim-in{animation:fadeInUp 0.5s ease both}
.anim-in-d1{animation-delay:0.1s}
.anim-in-d2{animation-delay:0.2s}
.anim-in-d3{animation-delay:0.3s}

/* Responsive */
@media(max-width:380px){
.zodiac-grid{gap:6px}
.zodiac-btn{padding:10px 2px 8px}
.zodiac-btn .emoji{font-size:1.3em}
.attr-grid{grid-template-columns:1fr}
}
@media(min-width:600px){
.container{padding:16px 24px}
.zodiac-grid{gap:12px}
}

/* Hide scrollbar for clean look */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* Section reveal */
.sign-detail{display:none}
.sign-detail.visible{display:block;animation:fadeIn 0.4s ease}

/* Today Sky Section */
.sky-card{
background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);
backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
padding:16px;margin-bottom:14px;
}
.sky-title{
text-align:center;font-family:'kai',serif;font-size:1.1em;color:var(--gold);
letter-spacing:4px;margin-bottom:12px;
}
.sky-grid{
display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;
}
.sky-planet{
display:flex;align-items:center;gap:6px;padding:4px 6px;
font-size:0.82em;color:var(--text);border-radius:var(--radius-xs);
transition:background 0.2s;
}
.sky-planet:hover{background:rgba(255,255,255,0.03)}
.sky-planet .p-sym{color:var(--gold-light);font-size:1em;min-width:16px;text-align:center}
.sky-planet .p-name{color:var(--text-dim);min-width:28px}
.sky-planet .p-pos{color:var(--text-bright);font-weight:bold}
.sky-planet .p-deg{color:var(--text-dim);font-size:0.9em;margin-left:2px}
.sky-planet .p-retro{color:#E25822;font-weight:bold;margin-left:3px;font-size:0.85em}
.sky-planet .p-dignity{color:var(--gold);margin-left:3px;font-size:0.85em}
.sky-notes{
margin-top:10px;padding-top:10px;border-top:1px solid rgba(212,175,55,0.08);
display:flex;flex-direction:column;gap:4px;
}
.sky-note{
font-size:0.8em;letter-spacing:0.5px;padding:3px 8px;border-radius:var(--radius-xs);
}
.sky-note.retro{color:#E25822;background:rgba(226,88,34,0.08)}
.sky-note.dignity{color:var(--gold);background:rgba(212,175,55,0.08)}
.sky-note.exalt{color:var(--purple-light);background:rgba(107,76,154,0.12)}

/* Transit section in fortune */
.transit-section{
margin:12px 0;padding:12px;
background:rgba(212,175,55,0.04);border:1px solid rgba(212,175,55,0.1);
border-radius:var(--radius-sm);
}
.transit-title{
font-family:'kai',serif;font-size:0.95em;color:var(--gold);
letter-spacing:2px;margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.transit-item{
font-size:0.85em;line-height:1.9;color:var(--text);margin-bottom:6px;
padding-left:12px;border-left:2px solid rgba(212,175,55,0.15);
}
.transit-item .t-planet{color:var(--gold-light);font-weight:bold}
.transit-item .t-aspect{font-weight:bold}
.transit-item .t-aspect.harmonious{color:#4ac4c4}
.transit-item .t-aspect.tense{color:#E25822}
.transit-item .t-aspect.neutral{color:var(--gold)}
</style>
</head>
<body>
<canvas id="starCanvas"></canvas>
<div class="container">

<!-- Back Nav -->
<nav class="back-nav">
<a href="/" onclick="if(window.top!==window.self){window.top.location.href='/';return false;}">
<span>&#8592;</span> 返回首页
</a>
</nav>

<!-- Header -->
<header class="header">
<span class="icon">&#10022;</span>
<h1>星座运势</h1>
<div class="sub">观星象 &middot; 知吉凶 &middot; 顺天时</div>
</header>

<!-- Date bar -->
<div class="date-bar" id="dateBar"></div>

<!-- Today Sky -->
<div class="sky-card anim-in" id="skyCard" style="margin-top:12px"></div>

<div class="divider"></div>

<!-- Today Rankings -->
<div class="section-title">今日星座排行</div>
<div class="glass-card anim-in" id="rankingCard">
<div class="ranking-list" id="rankingList"></div>
</div>

<div class="divider"></div>

<!-- Sign selector -->
<div class="section-title">选择你的星座</div>
<div class="zodiac-grid" id="zodiacGrid"></div>

<div class="divider"></div>

<!-- Selected sign detail (hidden until selected) -->
<div class="sign-detail" id="signDetail">

<!-- Profile -->
<div class="glass-card anim-in" id="profileCard"></div>

<!-- Character deep dive -->
<div class="glass-card anim-in anim-in-d1" id="characterCard"></div>

<!-- Compatibility -->
<div class="glass-card anim-in anim-in-d2" id="compatCard"></div>

<!-- Soul mission (PAID) -->
<div class="glass-card anim-in anim-in-d3" id="soulCard"></div>

<div class="divider"></div>

<!-- Fortune tabs -->
<div class="fortune-tabs" id="fortuneTabs"></div>

<!-- Fortune content -->
<div class="glass-card anim-in" id="fortuneContent"></div>

<!-- Four dimensions -->
<div id="dimCards"></div>

<!-- Power days / Caution days -->

<div class="divider"></div>

<p>仅供娱乐参考 &middot; 命运掌握在自己手中</p>
<p style="margin-top:8px">&copy; 2026 星象指引</p>
</footer>

</div><!-- /container -->

<script>
// ============================================================
// STAR CANVAS ANIMATION
// ============================================================
(function(){
const c=document.getElementById('starCanvas'),ctx=c.getContext('2d');
let stars=[];const NUM=120;
function resize(){c.width=window.innerWidth;c.height=window.innerHeight;initStars()}
function initStars(){
stars=[];for(let i=0;i<NUM;i++){
stars.push({x:Math.random()*c.width,y:Math.random()*c.height,
r:Math.random()*1.5+0.3,a:Math.random(),da:(Math.random()-0.5)*0.008,
dx:(Math.random()-0.5)*0.15,dy:(Math.random()-0.5)*0.1});
}}
function draw(){
ctx.clearRect(0,0,c.width,c.height);
for(let s of stars){
s.a+=s.da;if(s.a>1||s.a<0.1)s.da*=-1;
s.x+=s.dx;s.y+=s.dy;
if(s.x<0)s.x=c.width;if(s.x>c.width)s.x=0;
if(s.y<0)s.y=c.height;if(s.y>c.height)s.y=0;
ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle=`rgba(255,255,240,${s.a*0.7})`;ctx.fill();

// Get day-of-year (0-based) for current date
function getDayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  const oneDay = 1000 * 60 * 60 * 24;
  return Math.floor(diff / oneDay) - 1;
}
const TODAY_DOY = getDayOfYear(NOW);

// Get today's planetary positions
function getTodayPositions() {
  const doy = Math.max(0, Math.min(364, TODAY_DOY));
  const result = {};
  for (const p of PLANET_KEYS) {
    const arr = EPH.positions[p][doy];
    result[p] = { signIdx: arr[0], degree: arr[1], retrograde: arr[2] === 1 };
  }
  return result;
}

// Check if planet is in retrograde today using retro periods
function isRetrograde(planet) {
  const periods = EPH.retro[planet];
  if (!periods) return false;
  const doy = Math.max(0, Math.min(364, TODAY_DOY));
  for (const [start, end] of periods) {
    if (doy >= start && doy <= end) return true;
  }
  return false;
}

// Check if planet is in domicile
function isDomicile(planet, signIdx) {
  return DOMICILE[planet] && DOMICILE[planet].includes(signIdx);
}

// Check if planet is exalted
function isExalted(planet, signIdx) {
  return EXALTATION[planet] === signIdx;
}

// Calculate ecliptic longitude from sign index + degree
function eclipticLon(signIdx, degree) {
  return signIdx * 30 + degree;
}

// Calculate aspect between two ecliptic longitudes
function calcAspect(lon1, lon2) {
  const diff = Math.abs(lon1 - lon2);
  const angle = diff > 180 ? 360 - diff : diff;
  const orb = 8;
  if (angle < orb) return 'conjunction';
  if (Math.abs(angle - 60) < orb) return 'sextile';
  if (Math.abs(angle - 90) < orb) return 'square';
  if (Math.abs(angle - 120) < orb) return 'trine';
  if (Math.abs(angle - 180) < orb) return 'opposition';
  return null;
}

// ============================================================
// ASPECT-BASED FORTUNE INFLUENCE CALCULATOR
// ============================================================
function calcFortuneInfluence(userSignIdx) {
  const positions = getTodayPositions();
  const userLon = userSignIdx * 30 + 15; // midpoint of the sign
  let favorableCount = 0;
  let challengeCount = 0;
  let totalInfluence = 0;
  const aspects = [];

  for (const p of PLANET_KEYS) {
    const pos = positions[p];
    const pLon = eclipticLon(pos.signIdx, pos.degree);
    const aspect = calcAspect(pLon, userLon);
    const house = getHouse(pos.signIdx, userSignIdx);

    if (aspect) {
      const info = ASPECT_DESC[aspect];
      aspects.push({ planet: p, aspect, info, house, pos });
      if (info.harmonious) {
        favorableCount++;
        totalInfluence += (aspect === 'trine' ? 3 : aspect === 'conjunction' ? 2 : 1);
      } else {
        challengeCount++;
        totalInfluence -= (aspect === 'opposition' ? 2 : 1);
      }
    }

    // Bonus for planets in user's sign
    if (pos.signIdx === userSignIdx) {
      totalInfluence += 2;
    }
    // Bonus for same element (trine signs)
    const sameElement = (pos.signIdx % 4 === userSignIdx % 4) && pos.signIdx !== userSignIdx;
    if (sameElement) {
      totalInfluence += 1;
    }
    // Penalty for square signs
    const isSquare = Math.abs(pos.signIdx - userSignIdx) % 6 === 3;
    if (isSquare && !aspect) {
      totalInfluence -= 0.5;
    }
  }

  // Retrograde penalties
  for (const p of PLANET_KEYS) {
    if (isRetrograde(p)) {
      totalInfluence -= 0.5;
      if (p === 'mercury') totalInfluence -= 1; // Mercury retro is more impactful
    }
  }

  // Jupiter in a good house bonus
  const jupiterHouse = getHouse(positions.jupiter.signIdx, userSignIdx);
  if ([1,5,7,9,10,11].includes(jupiterHouse)) totalInfluence += 2;

  // Saturn in tough house penalty
  const saturnHouse = getHouse(positions.saturn.signIdx, userSignIdx);
  if ([1,4,7,10].includes(saturnHouse)) totalInfluence -= 1;

  // Normalize to 0-1 range (roughly -15 to +15 maps to 0-1)
  const normalized = Math.max(0, Math.min(1, (totalInfluence + 10) / 20));

  return { favorableCount, challengeCount, totalInfluence, normalized, aspects };
}

// ============================================================
// TRANSIT TEXT GENERATOR
// ============================================================
function describeTransits(userSignIdx) {
  const positions = getTodayPositions();
  const userLon = userSignIdx * 30 + 15;
  const lines = [];

  // Key planets for transit descriptions (skip moon - too fast)
  const keyPlanets = ['sun','mercury','venus','mars','jupiter','saturn'];
  const outerPlanets = ['uranus','neptune','pluto'];

  for (const p of keyPlanets) {
    const pos = positions[p];
    const house = getHouse(pos.signIdx, userSignIdx);
    const pLon = eclipticLon(pos.signIdx, pos.degree);
    const aspect = calcAspect(pLon, userLon);
    const houseInfo = HOUSE_DESC[house];
    const transitText = TRANSIT_HOUSE[p] && TRANSIT_HOUSE[p][house];
    const pName = PLANET_NAMES[p];
    const signName = SIGN_NAMES_ZH[pos.signIdx];
    const isRetro = pos.retrograde;
    const domicile = isDomicile(p, pos.signIdx);
    const exalted = isExalted(p, pos.signIdx);

    let line = '';
    if (transitText) {
      line = transitText;
      // Add dignity/exaltation note
      if (domicile) line += '\u3000' + pName + '目前在' + signName + '入庙运行，力量倍增。';
      else if (exalted) line += '\u3000' + pName + '在' + signName + '擢升，表现优异。';
      // Add retrograde note
      if (isRetro) line += '\u3000注意：' + pName + '目前逆行中，相关领域需多加审慎。';
    }

    if (line) {
      lines.push({
        planet: p,
        pName,
        signName,
        degree: pos.degree,
        house,
        houseName: houseInfo.name,
        aspect,
        retrograde: isRetro,
        text: line
      });
    }
  }

  // Add one outer planet highlight (the most impactful one)
  for (const p of outerPlanets) {
    const pos = positions[p];
    const house = getHouse(pos.signIdx, userSignIdx);
    const pLon = eclipticLon(pos.signIdx, pos.degree);
    const aspect = calcAspect(pLon, userLon);
    if (aspect || [1,4,7,10].includes(house)) {
      const transitText = TRANSIT_HOUSE[p] && TRANSIT_HOUSE[p][house];
      if (transitText) {
        lines.push({
          planet: p,
          pName: PLANET_NAMES[p],
          signName: SIGN_NAMES_ZH[pos.signIdx],
          degree: pos.degree,
          house,
          houseName: HOUSE_DESC[house].name,
          aspect,
          retrograde: pos.retrograde,
          text: transitText + (pos.retrograde ? '\u3000' + PLANET_NAMES[p] + '逆行中，影响更为深远。' : '')
        });
      }
      break;
    }
  }

  return lines;
}

function renderSkyCard() {
  const positions = getTodayPositions();
  const el = document.getElementById('skyCard');

  let gridHtml = '';
  for (const p of PLANET_KEYS) {
    const pos = positions[p];
    const sym = PLANET_SYMBOLS[p];
    const name = PLANET_NAMES[p];
    const signName = SIGN_NAMES_ZH[pos.signIdx];
    const deg = pos.degree;
    const retro = pos.retrograde;
    const domicile = isDomicile(p, pos.signIdx);
    const exalted = isExalted(p, pos.signIdx);

    gridHtml += '<div class="sky-planet">';
    gridHtml += '<span class="p-sym">' + sym + '</span>';
    gridHtml += '<span class="p-name">' + name + '</span>';
    gridHtml += '<span class="p-pos">' + signName + '</span>';
    gridHtml += '<span class="p-deg">' + deg + '\u00B0</span>';
    if (retro) gridHtml += '<span class="p-retro">\u211E</span>';
    if (domicile) gridHtml += '<span class="p-dignity">\u2726</span>';
    else if (exalted) gridHtml += '<span class="p-dignity" style="color:var(--purple-light)">\u2605</span>';
    gridHtml += '</div>';
  }

  // Build notes
  let notesHtml = '';
  const retroPlanets = [];
  const domicilePlanets = [];
  const exaltPlanets = [];

  for (const p of PLANET_KEYS) {
    const pos = positions[p];
    if (pos.retrograde || isRetrograde(p)) retroPlanets.push(PLANET_NAMES[p]);
    if (isDomicile(p, pos.signIdx)) domicilePlanets.push(PLANET_NAMES[p] + '\u5165\u5E99' + SIGN_NAMES_ZH[pos.signIdx]);
    else if (isExalted(p, pos.signIdx)) exaltPlanets.push(PLANET_NAMES[p] + '\u64E2\u5347' + SIGN_NAMES_ZH[pos.signIdx]);
  }

  if (retroPlanets.length > 0) {
    notesHtml += '<div class="sky-note retro">\u211E ' + retroPlanets.join('\u3001') + ' \u9006\u884C\u4E2D</div>';
  }
  if (domicilePlanets.length > 0) {
    notesHtml += '<div class="sky-note dignity">\u2726 ' + domicilePlanets.join(' | ') + '</div>';

function getMoonPhase(date){
const d=date||new Date();
const year=d.getFullYear(),month=d.getMonth()+1,day=d.getDate();
// Conways algorithm approximation
let r=year%100;let rr=r%19;
if(rr>9)rr-=19;
r=((rr*11)%30+month+day);
if(month<3)r+=2;
r-=((year<2000)?4:8.3);
r=Math.floor(r+0.5)%30;
if(r<0)r+=30;
return r;
}

const yearThemes=['深层蜕变与重生','稳步上升与积累','灵魂觉醒与方向重置','丰收与分享','突破瓶颈与自我超越','脚踏实地与厚积薄发'];

// FORTUNE GENERATION ENGINE
// ============================================================
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)]}
function fillTemplate(tpl,sign){
return tpl.replace(/\{ruler\}/g,sign.ruler).replace(/\{name\}/g,sign.name)
.replace(/\{area\}/g,pick(['事业','感情','健康','财富','人际关系','个人成长'],mulberry32(hashStr(sign.id+dateKey))))
.replace(/\{theme\}/g,pick(quarterThemes,mulberry32(hashStr(sign.id+dateKey+'theme'))));
}
function genStars(rng,base){
const v=rng();
if(base==='high')return v>0.3?5:4;
if(base==='low')return v>0.5?2:v>0.2?2:1;
return v>0.5?4:3;
}
function starStr(n){return '★'.repeat(n)+'☆'.repeat(5-n)}
function scoreFromStars(s){return s*20+(s>3?Math.floor(Math.random()*5):0)}

function genFortune(sign,period){
const rng=seededRng(dateKey,sign.id,period);
const signIdx=SIGN_IDX[sign.id];

// Get real planetary influence for daily/weekly
const influence=calcFortuneInfluence(signIdx);
const transits=describeTransits(signIdx);

// Determine overall level - influenced by real planetary data
const overallVal=rng();
// Blend PRNG with real influence (60% astro, 40% PRNG for daily)
const astroWeight=(period==='daily')?0.6:(period==='weekly')?0.4:0.25;
const blended=overallVal*(1-astroWeight)+influence.normalized*astroWeight;
let level=blended>0.6?'high':blended>0.25?'mid':'low';
// Star rating also influenced
const starBase=Math.round(blended*4)+1;
const overallStars=Math.max(1,Math.min(5,starBase));

// Pick templates based on period
let overallPool;
if(period==='daily'){
overallPool=level==='high'?T.overallHigh:level==='low'?T.overallLow:T.overallMid;
}else if(period==='weekly'){
overallPool=level==='high'?T.weeklyOverallHigh:level==='low'?T.weeklyOverallLow:T.weeklyOverallMid;
}else if(period==='monthly'){
overallPool=level==='high'?T.monthlyOverallHigh:level==='low'?T.monthlyOverallLow:T.monthlyOverallMid;
}else if(period==='quarterly'){
overallPool=T.quarterlyOverall;
}else{
overallPool=T.yearlyOverall;
}
let overallText=fillTemplate(pick(overallPool,rng),sign);

// For daily period, append real transit summary to overall text
if(period==='daily' && transits.length>0){
const positions=getTodayPositions();
const sunPos=positions.sun;
const sunSign=SIGN_NAMES_ZH[sunPos.signIdx];
const sunDeg=sunPos.degree;
const sunHouse=getHouse(sunPos.signIdx,signIdx);
const sunHouseName=HOUSE_DESC[sunHouse].name;
overallText+=' 从实时星象来看，太阳目前在'+sunSign+sunDeg+'\u00B0运行，正穿越你的第'+sunHouse+'宫（'+sunHouseName+'）。';
// Add most impactful transit note
const impactful=transits.find(t=>t.aspect&&['jupiter','venus','saturn'].includes(t.planet));
if(impactful){
const asp=impactful.aspect?ASPECT_DESC[impactful.aspect]:null;
if(asp){
overallText+=impactful.pName+'在'+impactful.signName+impactful.degree+'\u00B0，与你的太阳星座形成'+asp.name+'（'+asp.nature+'），'+asp.desc+'。';
}
}
}

// Dimensions - influenced by real planetary data per category
const dims=['love','career','wealth','health'];
const dimNames=['爱情运势','事业运势','财富运势','健康运势'];
const dimIcons=['💕','💼','💰','🌿'];
// Map dimensions to influential planets
const dimPlanets={love:['venus','moon','mars'],career:['sun','saturn','jupiter','mars'],wealth:['venus','jupiter','mercury'],health:['mars','moon','saturn']};
const dimResults=[];
const positions=getTodayPositions();
for(let i=0;i<4;i++){
const dRng=seededRng(dateKey,sign.id,period+dims[i]);
const dVal=dRng();
// Calculate dimension-specific planetary influence
let dimInfluence=0;
const relevantPlanets=dimPlanets[dims[i]];
for(const p of relevantPlanets){
const pos=positions[p];
const pLon=eclipticLon(pos.signIdx,pos.degree);
const userLon=signIdx*30+15;
const asp=calcAspect(pLon,userLon);
if(asp){
const info=ASPECT_DESC[asp];
dimInfluence+=info.harmonious?1:-0.7;
}
if(isDomicile(p,pos.signIdx))dimInfluence+=0.5;
if(pos.retrograde)dimInfluence-=0.3;
}
const dimNorm=Math.max(0,Math.min(1,(dimInfluence+3)/6));
const dimBlended=dVal*(1-astroWeight)+dimNorm*astroWeight;
const dLevel=dimBlended>0.55?'high':dimBlended>0.2?'mid':'low';
const dStars=Math.max(1,Math.min(5,Math.round(dimBlended*4)+1));
let pool;
if(dims[i]==='love') pool=dLevel==='high'?T.loveHigh:dLevel==='low'?T.loveLow:T.loveMid;
else if(dims[i]==='career') pool=dLevel==='high'?T.careerHigh:dLevel==='low'?T.careerLow:T.careerMid;
else if(dims[i]==='wealth') pool=dLevel==='high'?T.wealthHigh:dLevel==='low'?T.wealthLow:T.wealthMid;
else pool=dLevel==='high'?T.healthHigh:dLevel==='low'?T.healthLow:T.healthMid;
let text=fillTemplate(pick(pool,dRng),sign);

// Append real transit info for daily
if(period==='daily'){
const dimPlanetKey=relevantPlanets[0]; // primary planet for this dimension
const pp=positions[dimPlanetKey];
const ppSign=SIGN_NAMES_ZH[pp.signIdx];
const ppHouse=getHouse(pp.signIdx,signIdx);
const ppHouseName=HOUSE_DESC[ppHouse].name;
const ppName=PLANET_NAMES[dimPlanetKey];
text+=' '+ppName+'目前在'+ppSign+pp.degree+'\u00B0运行，落在你的第'+ppHouse+'宫（'+ppHouseName+'），';
if(dLevel==='high')text+='为这个领域带来积极的能量支持。';
else if(dLevel==='low')text+='提醒你在这个领域需要多加留意。';
else text+='整体影响中性，保持稳健即可。';
if(pp.retrograde)text+=ppName+'逆行中，相关事务宜缓不宜急。';
if(isDomicile(dimPlanetKey,pp.signIdx))text+=ppName+'在'+ppSign+'入庙，力量增强。';
}
const tip=pick(T.tips[dims[i]],dRng);
dimResults.push({name:dimNames[i],icon:dimIcons[i],stars:dStars,text,tip});
}

// Lucky attributes
const colors=['红色','橙色','金色','绿色','蓝色','紫色','白色','银色','粉色','黄色','深蓝色','青色'];
const dirs=['东','南','西','北','东南','东北','西南','西北'];
const times=['早晨6-8点','上午9-11点','中午12-14点','下午15-17点','傍晚17-19点','晚上20-22点'];
const luckyColor=pick(colors,seededRng(dateKey,sign.id,period+'lc'));
const luckyNum=Math.floor(seededRng(dateKey,sign.id,period+'ln')()*89)+1;
const luckyDir=pick(dirs,seededRng(dateKey,sign.id,period+'ld'));
const luckyTime=pick(times,seededRng(dateKey,sign.id,period+'lt'));

// Power days & caution days
let powerDays=[], cautionDays=[];
if(period==='weekly'||period==='monthly'){
const dRng2=seededRng(dateKey,sign.id,period+'days');
const baseDate=new Date(NOW);
const range=period==='weekly'?7:30;
for(let i=0;i<3;i++){
const pd=Math.floor(dRng2()*range)+1;
const pDate=new Date(baseDate);pDate.setDate(pDate.getDate()+pd);
powerDays.push({
date:`${pDate.getMonth()+1}/${pDate.getDate()}`,
desc:fillTemplate(pick(T.powerDayDescs,dRng2),sign)
});
const cd=Math.floor(dRng2()*range)+1;
const cDate=new Date(baseDate);cDate.setDate(cDate.getDate()+cd);
cautionDays.push({
date:`${cDate.getMonth()+1}/${cDate.getDate()}`,
desc:fillTemplate(pick(T.cautionDayDescs,dRng2),sign)
});
}
}

return {overallStars,overallText,dims:dimResults,luckyColor,luckyNum,luckyDir,luckyTime,powerDays,cautionDays,transits};
}

function genRankings(){
const rankings=[];
const summariesHigh=["桃花朵朵开，魅力挡不住","贵人运爆棚，事半功倍","财神眷顾，收获满满","灵感泉涌，才华横溢","好运连连，万事亨通","星光璀璨，闪耀全场"];
const summariesMid=["稳扎稳打，小有收获","保持节奏，静待花开","沟通顺畅，合作愉快","心态平和，稳步前行","整理思绪，蓄势待发","以退为进，智慧之选"];
const summariesLow=["韬光养晦，等待时机","注意休息，养精蓄锐","谨言慎行，避免冲突","低调行事，减少风险"];
for(let i=0;i<SIGNS.length;i++){
const s=SIGNS[i];
const rng=seededRng(dateKey,s.id,'ranking');
const rngVal=rng()*40;
// Use real planetary influence to modify score
const influence=calcFortuneInfluence(i);
// Base score: 60-100, shifted by planetary influence (normalized 0-1, center ~0.5)
const astroShift=(influence.normalized-0.5)*30; // -15 to +15
const score=Math.max(50,Math.min(99,Math.floor(rngVal+60+astroShift)));
const stars=score>=90?5:score>=80?4:score>=70?3:score>=60?2:1;
const pool=score>=85?summariesHigh:score>=65?summariesMid:summariesLow;
rankings.push({sign:s,score,stars,summary:pick(pool,rng)});
}
rankings.sort((a,b)=>b.score-a.score);
return rankings;
}
