<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星座运势 - 每日星象指引</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#080810;--bg-card:rgba(18,18,32,0.85);--bg-card-hover:rgba(25,25,45,0.9);
--gold:#D4AF37;--gold-light:#F0D68A;--gold-dim:#8B7D3C;--gold-dark:#a08040;
--purple:#6B4C9A;--purple-light:#9B7ED8;
--text:#F5F0E8;--text-dim:#A09880;--text-bright:#fff8e8;
--border:rgba(212,175,55,0.2);--shadow:0 8px 32px rgba(0,0,0,0.6);
--glass:rgba(18,18,32,0.7);--glass-border:rgba(212,175,55,0.15);
--fire:#E25822;--earth:#8B6914;--air:#4A90D9;--water:#2E8B8B;
}
@font-face{font-family:'kai';src:local('KaiTi'),local('楷体'),local('STKaiti')}
body{
font-family:'Microsoft YaHei','PingFang SC',sans-serif;
background:var(--bg-primary);color:var(--text);
min-height:100vh;line-height:1.8;font-size:16px;
background-image:
  radial-gradient(ellipse at 20% 0%,rgba(107,76,154,0.08) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 100%,rgba(212,175,55,0.04) 0%,transparent 50%);
}
body::before{
content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* Stars */
@keyframes twinkle{0%,100%{opacity:0.3}50%{opacity:1}}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite}

.container{max-width:480px;margin:0 auto;padding:16px;position:relative;z-index:1}

/* Header */
.header{text-align:center;padding:24px 0 16px}
.header .icon{font-size:2.2em;display:block;margin-bottom:4px;filter:drop-shadow(0 0 12px rgba(212,175,55,0.4))}
.header h1{
font-family:'kai',serif;font-size:2em;color:var(--gold);letter-spacing:8px;
text-shadow:0 0 30px rgba(212,175,55,0.3);
}
.header .sub{color:var(--text-dim);font-size:0.85em;letter-spacing:3px;margin-top:4px}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:12px 0}

/* Date display */
.date-bar{
text-align:center;padding:10px;color:var(--gold-light);font-size:0.9em;letter-spacing:2px;
background:rgba(212,175,55,0.05);border-radius:12px;border:1px solid var(--glass-border);margin-bottom:16px;
}

/* Sign selector grid */
.sign-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.sign-btn{
background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;
padding:10px 4px;text-align:center;cursor:pointer;transition:all 0.3s;
}
.sign-btn:hover,.sign-btn.active{
background:rgba(212,175,55,0.12);border-color:var(--gold-dim);
box-shadow:0 0 20px rgba(212,175,55,0.15);
}
.sign-btn .emoji{font-size:1.6em;display:block;margin-bottom:2px}
.sign-btn .name{font-size:0.8em;color:var(--text-dim)}
.sign-btn.active .name{color:var(--gold-light)}
.sign-btn .date{font-size:0.6em;color:var(--text-dim);opacity:0.6}

/* Sign info card */
.sign-info{
background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;
padding:20px;margin-bottom:16px;display:none;
}
.sign-info.show{display:block}
.sign-info .top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.sign-info .big-emoji{font-size:3em}
.sign-info .meta h2{font-family:'kai',serif;font-size:1.5em;color:var(--gold);letter-spacing:4px}
.sign-info .meta .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.sign-info .meta .tag{
font-size:0.7em;padding:2px 8px;border-radius:20px;
background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.2);color:var(--gold-light);
}
.element-fire .tag.el{background:rgba(226,88,34,0.15);border-color:rgba(226,88,34,0.3);color:#ff8a5c}
.element-earth .tag.el{background:rgba(139,105,20,0.15);border-color:rgba(139,105,20,0.3);color:#d4a844}
.element-air .tag.el{background:rgba(74,144,217,0.15);border-color:rgba(74,144,217,0.3);color:#7cb8f0}
.element-water .tag.el{background:rgba(46,139,139,0.15);border-color:rgba(46,139,139,0.3);color:#5ccaca}

/* Lucky items row */
.lucky-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.lucky-item{
flex:1;min-width:70px;text-align:center;padding:8px 4px;
background:rgba(212,175,55,0.05);border-radius:10px;border:1px solid var(--glass-border);
}
.lucky-item .label{font-size:0.65em;color:var(--text-dim)}
.lucky-item .val{font-size:0.85em;color:var(--gold-light);margin-top:2px}

/* Tab bar */
.tab-bar{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.tab{
flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:0.85em;cursor:pointer;
background:var(--glass);border:1px solid var(--glass-border);color:var(--text-dim);
transition:all 0.3s;white-space:nowrap;
}
.tab.active{background:rgba(212,175,55,0.15);border-color:var(--gold-dim);color:var(--gold-light)}
.tab .lock{font-size:0.75em;margin-left:2px;opacity:0.5}

/* Rating display */
.rating-section{margin-bottom:16px}
.overall{
text-align:center;padding:20px;
background:linear-gradient(135deg,rgba(212,175,55,0.08),rgba(107,76,154,0.08));
border-radius:16px;border:1px solid var(--glass-border);margin-bottom:12px;
}
.overall .score{font-size:2.4em;margin-bottom:4px}
.overall .label{font-size:0.85em;color:var(--text-dim);letter-spacing:2px}
.overall .desc{font-size:0.9em;color:var(--text);margin-top:8px;line-height:1.7}

/* Sub ratings */
.sub-ratings{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sub-rate{
padding:12px;background:var(--glass);border-radius:12px;border:1px solid var(--glass-border);
}
.sub-rate .cat{font-size:0.75em;color:var(--text-dim);margin-bottom:4px}
.sub-rate .stars{font-size:1.1em;margin-bottom:4px}
.sub-rate .txt{font-size:0.8em;color:var(--text);line-height:1.6}

/* Ranking list */
.ranking{margin-bottom:16px}
.ranking h3{font-family:'kai',serif;font-size:1.1em;color:var(--gold);margin-bottom:10px;letter-spacing:3px}
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-item{
display:flex;align-items:center;gap:8px;padding:8px 12px;
background:var(--glass);border-radius:10px;border:1px solid var(--glass-border);
}
.rank-item .pos{
width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
font-size:0.75em;font-weight:bold;flex-shrink:0;
}
.rank-item:nth-child(1) .pos{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000}
.rank-item:nth-child(2) .pos{background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:#000}
.rank-item:nth-child(3) .pos{background:linear-gradient(135deg,#CD7F32,#A0522D);color:#fff}
.rank-item .sign-name{flex:1;font-size:0.85em}
.rank-item .rank-stars{font-size:0.85em;color:var(--gold-light)}

/* Paywall overlay */
.paywall{
position:relative;margin-top:16px;
}
.paywall-content{filter:blur(6px);pointer-events:none;user-select:none;opacity:0.4}
.paywall-overlay{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
text-align:center;z-index:2;width:90%;
}
.paywall-overlay .lock-icon{font-size:2.5em;margin-bottom:8px}
.paywall-overlay .lock-text{font-size:0.95em;color:var(--text);margin-bottom:12px;line-height:1.6}
.unlock-btn{
display:inline-block;padding:12px 32px;
background:linear-gradient(135deg,var(--gold),var(--gold-dark));
color:#000;font-weight:bold;font-size:0.95em;border:none;border-radius:25px;
cursor:pointer;letter-spacing:2px;
box-shadow:0 4px 20px rgba(212,175,55,0.3);
transition:all 0.3s;
}
.unlock-btn:hover{box-shadow:0 6px 30px rgba(212,175,55,0.5);transform:translateY(-2px)}
.price-tag{font-size:0.75em;color:var(--text-dim);margin-top:6px}

/* Detail sections (paid) */
.detail-section{margin-bottom:16px}
.detail-section h3{
font-family:'kai',serif;font-size:1em;color:var(--gold);margin-bottom:8px;
padding-bottom:6px;border-bottom:1px solid var(--glass-border);letter-spacing:2px;
}
.detail-text{font-size:0.88em;color:var(--text);line-height:1.9}

/* Personality section */
.personality{
background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;
padding:16px;margin-bottom:16px;
}
.personality h3{font-family:'kai',serif;font-size:1.05em;color:var(--gold);margin-bottom:8px;letter-spacing:2px}
.personality p{font-size:0.85em;line-height:1.8;color:var(--text)}
.traits{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.trait{
font-size:0.75em;padding:4px 10px;border-radius:15px;
background:rgba(107,76,154,0.12);border:1px solid rgba(107,76,154,0.25);color:var(--purple-light);
}

/* Footer */
.footer{text-align:center;padding:24px 0;color:var(--text-dim);font-size:0.75em;letter-spacing:1px}
.footer a{color:var(--gold-dim);text-decoration:none}

/* Compatibility mini */
.compat{margin-top:12px}
.compat h4{font-size:0.85em;color:var(--gold-dim);margin-bottom:6px}
.compat-row{display:flex;gap:6px;flex-wrap:wrap}
.compat-tag{
font-size:0.75em;padding:3px 8px;border-radius:10px;
background:rgba(212,175,55,0.08);border:1px solid var(--glass-border);color:var(--text-dim);
}
.compat-tag.good{background:rgba(0,168,107,0.1);border-color:rgba(0,168,107,0.25);color:#4CD9A0}
.compat-tag.bad{background:rgba(200,50,50,0.1);border-color:rgba(200,50,50,0.25);color:#E87070}

/* Responsive */
@media(max-width:380px){
.sign-grid{grid-template-columns:repeat(3,1fr)}
.sign-btn .date{display:none}
.sub-ratings{grid-template-columns:1fr}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.4s ease-out}

/* Hide sections */
.hidden{display:none!important}
</style>
</head>

const COLORS_POOL = ['红色','橙色','金色','绿色','蓝色','紫色','粉色','银色','白色','青色','珊瑚色','薄荷绿'];
const DIRECTIONS = ['正东','东南','正南','西南','正西','西北','正北','东北'];

// Generate fortune for a sign and period
function generateFortune(signIdx, period) {
  let periodKey;
  switch(period) {
    case 'daily': periodKey = getToday(); break;
    case 'weekly': periodKey = getWeekId(); break;
    case 'monthly': periodKey = getMonthId(); break;
    case 'quarterly': periodKey = getQuarterId(); break;
    case 'yearly': periodKey = getYearId(); break;
  }

  const seed = dateSeed(periodKey, signIdx, 'fortune2026');
  const rng = mulberry32(seed);

  // Generate ratings (1-5)
  const pick = (arr) => arr[Math.floor(rng() * arr.length)];
  const rate = () => {
    const r = rng();
    if(r < 0.15) return 2;
    if(r < 0.35) return 3;
    if(r < 0.65) return 4;
    if(r < 0.85) return 5;
    return 3;
  };

  const overallRate = rate();
  const loveRate = rate();
  const careerRate = rate();
  const wealthRate = rate();
  const healthRate = rate();

  const level = (r) => r >= 4 ? 'high' : r >= 3 ? 'mid' : 'low';

  // Use period-specific templates for weekly/monthly/quarterly/yearly
  let periodText = '';
  if (period !== 'daily' && TP[period]) {
    periodText = pick(TP[period][level(overallRate)]);
  }

  return {
    overall: overallRate,
    overallText: period === 'daily' ? pick(T.overall[level(overallRate)]) : periodText,
    love: loveRate,
    loveText: pick(T.love[level(loveRate)]),
    career: careerRate,
    careerText: pick(T.career[level(careerRate)]),
    wealth: wealthRate,
    wealthText: pick(T.wealth[level(wealthRate)]),
    health: healthRate,
    healthText: pick(T.health[level(healthRate)]),
    luckyColor: pick(COLORS_POOL),
    luckyDir: pick(DIRECTIONS),
    luckyNum: Math.floor(rng() * 99) + 1,
    luckyTime: `${Math.floor(rng()*12)+8}:00-${Math.floor(rng()*12)+8+2}:00`,
    period: period
  };
}

function starsHTML(rating) {
  return '★'.repeat(rating) + '☆'.repeat(5 - rating);
}

        <div class="sub-rate"><div class="cat">💕 爱情运势</div><div class="stars">${starsHTML(f.love)}</div><div class="txt">${f.loveText}</div></div>
        <div class="sub-rate"><div class="cat">💼 事业运势</div><div class="stars">${starsHTML(f.career)}</div><div class="txt">${f.careerText}</div></div>
        <div class="sub-rate"><div class="cat">💰 财富运势</div><div class="stars">${starsHTML(f.wealth)}</div><div class="txt">${f.wealthText}</div></div>
        <div class="sub-rate"><div class="cat">💚 健康运势</div><div class="stars">${starsHTML(f.health)}</div><div class="txt">${f.healthText}</div></div>
      </div>
    `;
  }

  area.innerHTML = html;
}

function getPeriodLabel() {
  const labels = {daily:'今日',weekly:'本周',monthly:'本月',quarterly:'本季度',yearly:'2026年度'};
  return labels[currentPeriod] || '今日';
}

function renderRankings() {
  const list = document.getElementById('rankList');
  // Generate today's rankings
  const today = getToday();
  const rankings = SIGNS.map((s,i) => {
    const f = generateFortune(i, 'daily');
    return {idx:i, score: f.overall + f.love*0.2 + f.career*0.2 + f.wealth*0.2 + f.health*0.2, rate:f.overall};
  }).sort((a,b) => b.score - a.score);

  // Show top 3
  list.innerHTML = rankings.slice(0,3).map((r,pos) => `
    <div class="rank-item">
      <div class="pos">${pos+1}</div>
      <span class="emoji" style="font-size:1.2em">${SIGNS[r.idx].emoji}</span>
      <span class="sign-name">${SIGNS[r.idx].name}</span>
      <span class="rank-stars">${starsHTML(r.rate)}</span>
    </div>
  `).join('');
}

function goUnlock() {
  // Redirect to key entry/payment page
  window.top.location.href = '/site/horoscope';
}

// Init
document.addEventListener('DOMContentLoaded', init);
</script>
