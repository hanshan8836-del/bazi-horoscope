<html lang="zh-CN">
<head>

<style>

*{margin:0;padding:0;box-sizing:border-box}

@font-face{font-family:'kai';src:local('KaiTi'),local('STKaiti'),local('AR PL UKai CN')}
html{scroll-behavior:smooth}
body{
font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;
background:var(--bg-primary);color:var(--text);
min-height:100vh;line-height:1.8;font-size:15px;
overflow-x:hidden;
background-image:
  radial-gradient(ellipse at 20% 0%,rgba(212,175,55,0.04) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 100%,rgba(100,60,180,0.03) 0%,transparent 50%);
}
body::before{
content:'';position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* Star canvas */
#starCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

.container{max-width:480px;margin:0 auto;padding:16px;position:relative;z-index:1}

/* Back nav */
.back-nav{
padding:8px 0;margin-bottom:8px;
}
.back-nav a{
color:var(--gold-dim);text-decoration:none;font-size:14px;
transition:color 0.3s;
}
.back-nav a:hover{color:var(--gold)}

/* Header */
.header{text-align:center;padding:20px 0 16px;position:relative}
.header::before,.header::after{
content:'';position:absolute;left:50%;transform:translateX(-50%);
height:1px;
background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.header::before{top:0;width:280px}
.header::after{bottom:0;width:200px;opacity:0.5}
.header-icon{font-size:2em;display:block;margin-bottom:6px;
filter:drop-shadow(0 0 12px rgba(212,175,55,0.4))}
.header h1{
font-family:'kai',serif;font-size:1.8em;
color:var(--gold);letter-spacing:8px;
text-shadow:0 0 30px rgba(212,175,55,0.3);
}
.header .subtitle{
color:var(--text-dim);margin-top:8px;font-size:0.85em;letter-spacing:4px;
font-family:'kai',serif;
}

/* Date display */
.date-display{
text-align:center;padding:12px 0;
color:var(--gold-dim);font-size:0.9em;
font-family:'kai',serif;letter-spacing:2px;
}

/* Glass card base */
.card{
background:var(--glass-bg);
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
border:1px solid var(--glass-border);
border-radius:14px;padding:20px;margin-bottom:16px;
box-shadow:var(--shadow);
position:relative;overflow:hidden;
}
.card::before{
content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,rgba(212,175,55,0.25),transparent);
}
.card-title{
font-family:'kai',serif;font-size:1.1em;color:var(--gold);
margin-bottom:12px;letter-spacing:3px;
display:flex;align-items:center;gap:8px;
}
.card-title::after{
content:'';flex:1;height:1px;
background:linear-gradient(90deg,var(--gold-dim),transparent);
}

/* Today's sky */
.sky-grid{
display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
}
.sky-item{
text-align:center;padding:6px 2px;
border-radius:8px;
background:rgba(212,175,55,0.05);
border:1px solid rgba(212,175,55,0.1);
transition:all 0.3s;
}
.sky-item:hover{background:rgba(212,175,55,0.1);transform:translateY(-2px)}
.sky-item .planet-sym{font-size:1.2em;display:block;margin-bottom:2px}
.sky-item .planet-name{font-size:0.65em;color:var(--text-dim);display:block}
.sky-item .planet-pos{font-size:0.7em;color:var(--gold-light);display:block;margin-top:2px}
.sky-item.retro{border-color:rgba(231,76,60,0.4)}
.sky-item.retro .planet-pos::after{content:' \u211E';color:#e74c3c;font-size:0.9em}

/* Moon phase */
.moon-phase{
text-align:center;padding:16px;
display:flex;align-items:center;justify-content:center;gap:16px;
}
.moon-emoji{font-size:2.4em;filter:drop-shadow(0 0 8px rgba(212,175,55,0.3))}
.moon-info{text-align:left}
.moon-name{color:var(--gold);font-family:'kai',serif;font-size:1.1em}
.moon-detail{color:var(--text-dim);font-size:0.8em;margin-top:2px}

/* Rankings */
.rankings-section .rank-list{display:flex;flex-direction:column;gap:6px}
.rank-item{
display:flex;align-items:center;gap:10px;
padding:8px 12px;border-radius:10px;
background:rgba(212,175,55,0.03);
border:1px solid rgba(212,175,55,0.06);
transition:all 0.3s;cursor:pointer;
}
.rank-item:hover{background:rgba(212,175,55,0.08);transform:translateX(4px)}
.rank-num{
width:24px;height:24px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:0.75em;font-weight:bold;
}
.rank-num.top1{background:linear-gradient(135deg,#D4AF37,#F0D68A);color:#080810}
.rank-num.top2{background:linear-gradient(135deg,#C0C0C0,#E8E8E8);color:#080810}
.rank-num.top3{background:linear-gradient(135deg,#CD7F32,#E8B87C);color:#080810}
.rank-num.normal{background:rgba(212,175,55,0.1);color:var(--text-dim)}
.rank-sign{font-size:1.3em}
.rank-name{flex:1;font-size:0.9em}
.rank-score{
font-size:0.8em;color:var(--gold-light);
display:flex;align-items:center;gap:4px;
}
.rank-bar{
width:60px;height:4px;border-radius:2px;
background:rgba(255,255,255,0.1);
overflow:hidden;
}
.rank-bar-fill{height:100%;border-radius:2px;
background:linear-gradient(90deg,var(--gold-dim),var(--gold));

}

/* Zodiac grid */
.zodiac-grid{
display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
}
.zodiac-btn{
text-align:center;padding:12px 4px;border-radius:12px;
background:rgba(212,175,55,0.04);
border:1px solid rgba(212,175,55,0.1);
cursor:pointer;transition:all 0.3s;
-webkit-tap-highlight-color:transparent;
user-select:none;
}
.zodiac-btn:hover,.zodiac-btn.active{
background:rgba(212,175,55,0.12);
border-color:var(--gold);
transform:translateY(-3px);
box-shadow:0 4px 20px rgba(212,175,55,0.2);
}
.zodiac-btn .z-icon{font-size:1.6em;display:block;margin-bottom:4px}
.zodiac-btn .z-name{font-size:0.85em;color:var(--gold-light);display:block}
.zodiac-btn .z-date{font-size:0.6em;color:var(--text-dim);display:block;margin-top:2px}

/* Detail sections */
#signDetail{
opacity:0;transform:translateY(20px);
transition:opacity 0.5s,transform 0.5s;
}
#signDetail.visible{opacity:1;transform:translateY(0)}

/* Profile card */
.profile-card{
display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.profile-item{
padding:8px;border-radius:8px;
background:rgba(212,175,55,0.04);
text-align:center;
}
.profile-label{font-size:0.7em;color:var(--text-dim);display:block;margin-bottom:2px}
.profile-value{font-size:0.85em;color:var(--gold-light)}

/* Personality tabs */
.persona-tabs{
display:flex;gap:0;margin-bottom:16px;
border-radius:10px;overflow:hidden;
border:1px solid var(--glass-border);
}

flex:1;padding:8px 4px;text-align:center;
font-size:0.75em;cursor:pointer;
background:rgba(212,175,55,0.04);
color:var(--text-dim);
transition:all 0.3s;

}
.persona-tab:last-child{border-right:none}
.persona-tab.active,.persona-tab:hover{
background:rgba(212,175,55,0.15);
color:var(--gold);
}
.persona-content{
font-size:0.9em;line-height:2;color:var(--text);
}
.persona-content p{margin-bottom:12px;text-indent:2em}

/* Soul mission */
.soul-section{margin-top:8px}
.soul-develop,.soul-leave{
display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;
}
.soul-tag{
padding:4px 10px;border-radius:16px;font-size:0.78em;
}
.soul-tag.good{
background:rgba(46,204,113,0.12);color:#2ecc71;
border:1px solid rgba(46,204,113,0.2);
}
.soul-tag.bad{
background:rgba(231,76,60,0.1);color:#e74c3c;
border:1px solid rgba(231,76,60,0.2);
}
.soul-quote{
padding:12px 16px;border-left:3px solid var(--gold-dim);
margin:12px 0;font-style:italic;
color:var(--text-dim);font-size:0.88em;line-height:1.8;
background:rgba(212,175,55,0.03);border-radius:0 8px 8px 0;
}

/* Compatibility */
.compat-grid{
display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
}
.compat-item{
padding:10px;border-radius:10px;text-align:center;
background:rgba(212,175,55,0.04);
border:1px solid rgba(212,175,55,0.08);
}
.compat-label{font-size:0.7em;color:var(--text-dim);display:block;margin-bottom:4px}
.compat-signs{font-size:1.1em;display:block}

/* Fortune tabs */
.fortune-tabs{
display:flex;gap:0;margin-bottom:16px;
border-radius:10px;overflow:hidden;
border:1px solid var(--glass-border);
}
.fortune-tab{
flex:1;padding:10px 4px;text-align:center;
font-size:0.8em;cursor:pointer;
background:rgba(212,175,55,0.04);
color:var(--text-dim);
transition:all 0.3s;
border-right:1px solid var(--glass-border);
-webkit-tap-highlight-color:transparent;
}
.fortune-tab:last-child{border-right:none}
.fortune-tab.active,.fortune-tab:hover{
background:rgba(212,175,55,0.15);color:var(--gold);
}

/* Fortune content */
.fortune-overview{
font-size:0.9em;line-height:2;margin-bottom:16px;
padding:12px;border-radius:10px;
background:rgba(212,175,55,0.03);
}
.fortune-dims{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.fortune-dim{
padding:12px;border-radius:10px;
background:rgba(212,175,55,0.04);
border:1px solid rgba(212,175,55,0.08);
}
.dim-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.dim-icon{font-size:1.2em}
.dim-name{font-size:0.8em;color:var(--gold-light)}
.dim-score{font-size:0.75em;color:var(--text-dim)}
.dim-bar{
width:100%;height:4px;border-radius:2px;
background:rgba(255,255,255,0.1);margin-bottom:6px;
}
.dim-bar-fill{height:100%;border-radius:2px;transition:width 0.8s ease}
.dim-bar-fill.love{background:linear-gradient(90deg,#e74c3c,#f39c12)}
.dim-bar-fill.career{background:linear-gradient(90deg,#3498db,#2ecc71)}
.dim-bar-fill.wealth{background:linear-gradient(90deg,#D4AF37,#F0D68A)}
.dim-bar-fill.health{background:linear-gradient(90deg,#2ecc71,#27ae60)}
.dim-text{font-size:0.78em;color:var(--text-dim);line-height:1.6}

/* Lucky items */
.lucky-grid{
display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.lucky-item{
text-align:center;padding:10px 6px;border-radius:10px;
background:rgba(212,175,55,0.04);
border:1px solid rgba(212,175,55,0.08);
}
.lucky-label{font-size:0.7em;color:var(--text-dim);display:block;margin-bottom:4px}
.lucky-value{font-size:0.9em;color:var(--gold-light)}

/* Power days */
.power-days{margin-top:12px}
.day-item{
display:flex;align-items:center;gap:8px;
padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);
font-size:0.85em;
}
.day-dot{width:8px;height:8px;border-radius:50%}
.day-dot.good{background:#2ecc71}
.day-dot.caution{background:#e74c3c}
.day-date{color:var(--text-dim);min-width:50px}

/* Footer */
.footer{
text-align:center;padding:24px 0 40px;
color:var(--text-dim);font-size:0.75em;
border-top:1px solid rgba(212,175,55,0.1);
margin-top:20px;
}

/* Fade in animation */
@keyframes fadeInUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
.fade-in{animation:fadeInUp 0.6s ease forwards}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

/* Responsive tweaks */
@media(max-width:380px){
  .zodiac-grid{grid-template-columns:repeat(3,1fr)}
  .sky-grid{grid-template-columns:repeat(4,1fr)}
  .header h1{font-size:1.5em;letter-spacing:5px}
}

/* Paywall */
.paywall-wrap{position:relative}
.paywall-blur{filter:blur(8px);pointer-events:none;user-select:none;-webkit-user-select:none}
.paywall-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;background:rgba(8,8,16,0.6);border-radius:var(--radius);backdrop-filter:blur(4px)}
.paywall-icon{font-size:2.4em;margin-bottom:8px}
.paywall-text{font-size:1em;color:var(--text);text-align:center;line-height:1.6;margin-bottom:10px}
.paywall-sub{font-size:0.8em;color:var(--text-dim);margin-bottom:12px}
.paywall-btn{display:inline-block;padding:12px 36px;background:linear-gradient(135deg,#1a7a1a,#2d9e2d);border:1px solid rgba(80,200,80,0.4);color:#fff;font-size:1.1em;font-weight:bold;border-radius:12px;cursor:pointer;letter-spacing:3px;box-shadow:0 4px 16px rgba(0,120,0,0.25);transition:all 0.3s;text-decoration:none}
.paywall-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,120,0,0.4)}
.paywall-price{margin-top:8px;font-size:0.8em;color:var(--text-dim)}
.paywall-price b{color:#FFD700;font-size:1.4em}
.fortune-tab .lock-icon{font-size:0.7em;margin-left:2px;opacity:0.7}

</style>
</head>

<script>

// ============================================================
// LIGHTWEIGHT EPHEMERIS ENGINE
// Based on Jean Meeus "Astronomical Algorithms" 2nd Ed.
// Calculates planetary positions in ecliptic longitude
// Accuracy: Sun ~0.01deg, Moon ~0.5deg, Planets ~1deg
// ============================================================

const SIGNS = ['白羊','金牛','双子','巨蟹','狮子','处女','天秤','天蝎','射手','摩羯','水瓶','双鱼'];
const SIGN_KEYS = ['aries','taurus','gemini','cancer','leo','virgo','libra','scorpio','sagittarius','capricorn','aquarius','pisces'];
const PLANET_NAMES = {sun:'太阳',moon:'月亮',mercury:'水星',venus:'金星',mars:'火星',jupiter:'木星',saturn:'土星',uranus:'天王星',neptune:'海王星',pluto:'冥王星'};
const PLANET_SYMBOLS = {sun:'\u2609',moon:'\u263D',mercury:'\u263F',venus:'\u2640',mars:'\u2642',jupiter:'\u2643',saturn:'\u2644',uranus:'\u2645',neptune:'\u2646',pluto:'\u2647'};
const ELEMENT_MAP = {fire:'火象',earth:'土象',air:'风象',water:'水象'};

function toJD(year, month, day, hour) {
  hour = hour || 0;
  if (month <= 2) { year--; month += 12; }
  const A = Math.floor(year / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + hour/24 + B - 1524.5;
}
function toT(jd) { return (jd - 2451545.0) / 36525; }
function norm360(a) { a = a % 360; return a < 0 ? a + 360 : a; }
function rad(d) { return d * Math.PI / 180; }
function deg(r) { return r * 180 / Math.PI; }

function sunLongitude(T) {
  const L0 = norm360(280.46646 + 36000.76983 * T + 0.0003032 * T * T);
  const M = norm360(357.52911 + 35999.05029 * T - 0.0001537 * T * T);
  const Mrad = rad(M);
  const C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(Mrad)
          + (0.019993 - 0.000101 * T) * Math.sin(2 * Mrad)
          + 0.000289 * Math.sin(3 * Mrad);
  const sunLon = L0 + C;
  const omega = 125.04 - 1934.136 * T;
  const apparent = sunLon - 0.00569 - 0.00478 * Math.sin(rad(omega));
  return norm360(apparent);
}

function moonLongitude(T) {
  const Lp = norm360(218.3165 + 481267.8813 * T);
  const D  = norm360(297.8502 + 445267.1115 * T);
  const M  = norm360(357.5291 + 35999.0503 * T);
  const Mp = norm360(134.9634 + 477198.8676 * T);
  const F  = norm360(93.2720 + 483202.0175 * T);
  const Drad=rad(D), Mrad=rad(M), Mprad=rad(Mp), Frad=rad(F);
  let lon = Lp
    + 6.289 * Math.sin(Mprad)
    + 1.274 * Math.sin(2*Drad - Mprad)
    + 0.658 * Math.sin(2*Drad)
    + 0.214 * Math.sin(2*Mprad)
    - 0.186 * Math.sin(Mrad)
    - 0.114 * Math.sin(2*Frad)
    + 0.059 * Math.sin(2*Drad - 2*Mprad)
    + 0.057 * Math.sin(2*Drad - Mrad - Mprad)
    + 0.053 * Math.sin(2*Drad + Mprad)
    + 0.046 * Math.sin(2*Drad - Mrad)
    + 0.041 * Math.sin(Mprad - Mrad)
    - 0.035 * Math.sin(Drad)
    - 0.031 * Math.sin(Mprad + Mrad)
    - 0.015 * Math.sin(2*Frad - 2*Drad)
    + 0.012 * Math.sin(Mprad - 2*Frad);
  return norm360(lon);
}

function moonPhase(T) {
  return norm360(moonLongitude(T) - sunLongitude(T));
}

function moonPhaseName(angle) {

function solveKepler(M, e) {
  M = rad(M);
  let E = M;
  for (let i = 0; i < 20; i++) {
    const dE = (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
    E -= dE;
    if (Math.abs(dE) < 1e-9) break;
  }
  return E;
}

function planetLongitude(name, T) {
  const p = PLANET_ELEMENTS[name];
  if (!p) return 0;
  const L = norm360(p.L0 + p.Ld * T);
  const e = p.e0 + p.ed * T;
  const w = p.w0 + p.wd * T;
  const M = norm360(L - w);
  const E = solveKepler(M, e);
  const v = deg(2 * Math.atan2(Math.sqrt(1+e) * Math.sin(E/2), Math.sqrt(1-e) * Math.cos(E/2)));
  const lonHel = norm360(v + w);
  const Le = norm360(280.46646 + 36000.76983 * T);
  const Me = norm360(357.52911 + 35999.05029 * T);
  const Ce = (1.9146 - 0.004817*T) * Math.sin(rad(Me)) + 0.019993 * Math.sin(2*rad(Me));
  const lonEarth = norm360(Le + Ce);
  const Re = 1.00014 - 0.01671 * Math.cos(rad(Me)) - 0.00014 * Math.cos(2*rad(Me));
  const Rp = p.a * (1 - e * Math.cos(E));
  const x = Rp * Math.cos(rad(lonHel)) - Re * Math.cos(rad(lonEarth));
  const y = Rp * Math.sin(rad(lonHel)) - Re * Math.sin(rad(lonEarth));
  return norm360(deg(Math.atan2(y, x)));
}

function getAllPositions(date) {
  date = date || new Date();
  const jd = toJD(date.getFullYear(), date.getMonth()+1, date.getDate(), date.getHours());
  const T = toT(jd);
  const positions = {};
  const sunLon = sunLongitude(T);
  positions.sun = { lon: sunLon, sign: Math.floor(sunLon/30), deg: sunLon%30 };
  const moonLon = moonLongitude(T);
  positions.moon = { lon: moonLon, sign: Math.floor(moonLon/30), deg: moonLon%30 };
  const phase = moonPhase(T);
  positions.moonPhase = moonPhaseName(phase);
  positions.moonPhaseAngle = phase;
  for (const name of Object.keys(PLANET_ELEMENTS)) {
    const lon = planetLongitude(name, T);
    positions[name] = { lon, sign: Math.floor(lon/30), deg: lon%30 };
  }
  return positions;
}

function checkRetrogrades(date) {
  date = date || new Date();
  const today = getAllPositions(date);
  const yesterday = getAllPositions(new Date(date.getTime() - 86400000));
  const retro = {};
  for (const name of Object.keys(PLANET_ELEMENTS)) {
    let diff = today[name].lon - yesterday[name].lon;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    retro[name] = diff < 0;
  }
  return retro;
}

// Aspect detection
function getAspects(planetLon, signIdx) {
  const signMid = signIdx * 30 + 15;
  let diff = Math.abs(planetLon - signMid);
  if (diff > 180) diff = 360 - diff;

  if (diff < 8) return {type:'conjunction',name:'合相',score:3,desc:'能量聚焦'};
  if (Math.abs(diff - 60) < 6) return {type:'sextile',name:'六分相',score:2,desc:'和谐机遇'};
  if (Math.abs(diff - 90) < 7) return {type:'square',name:'刑相',score:-2,desc:'挑战压力'};
  if (Math.abs(diff - 120) < 8) return {type:'trine',name:'三分相',score:3,desc:'流畅顺利'};
  if (Math.abs(diff - 150) < 4) return {type:'quincunx',name:'梅花相',score:-1,desc:'需要调整'};
  if (Math.abs(diff - 180) < 8) return {type:'opposition',name:'对冲',score:-2,desc:'张力对峙'};
  return null;
}

// Planet weights for fortune scoring
const PLANET_WEIGHT = {sun:1.5,moon:1.2,mercury:1.0,venus:1.1,mars:1.0,jupiter:1.4,saturn:0.9,uranus:0.7,neptune:0.6,pluto:0.5};

// Calculate fortune for a sign on a date
function calcFortune(signIdx, date) {
  const pos = getAllPositions(date);
  const retro = checkRetrogrades(date);

  let totalScore = 50; // baseline
  const aspects = [];
  const transits = [];
  const planetList = ['sun','moon','mercury','venus','mars','jupiter','saturn','uranus','neptune','pluto'];

  for (const p of planetList) {
    const pData = pos[p];
    // Which house does this planet fall in (whole-sign)
    const house = ((pData.sign - signIdx + 12) % 12) + 1;
    transits.push({planet:p, house, sign:pData.sign, deg:pData.deg, retro:retro[p]||false});

    // Check aspect to sign
    const asp = getAspects(pData.lon, signIdx);
    if (asp) {
      const weight = PLANET_WEIGHT[p] || 1;
      let contribution = asp.score * weight * 5;
      // Retrograde reduces positive aspects, intensifies negative
      if (retro[p]) { contribution *= (asp.score > 0 ? 0.6 : 1.3); }
      totalScore += contribution;
      aspects.push({planet:p, ...asp, retrograde:retro[p]||false});
    }
  }

  // Jupiter in benefic houses (1,5,7,9,10,11) bonus
  const jupHouse = ((pos.jupiter.sign - signIdx + 12) % 12) + 1;
  if ([1,5,7,9,10,11].includes(jupHouse)) totalScore += 5;

  // Saturn in challenging houses (1,4,7,10) penalty
  const satHouse = ((pos.saturn.sign - signIdx + 12) % 12) + 1;
  if ([1,4,7,10].includes(satHouse)) totalScore -= 4;

  // Clamp score
  totalScore = Math.max(20, Math.min(95, Math.round(totalScore)));

  return { score: totalScore, aspects, transits, moonPhase: pos.moonPhase, moonPhaseAngle: pos.moonPhaseAngle };
}

// Generate sub-dimension scores from main score + specific planet aspects
function calcDimensions(fortune, signIdx) {
  const {score, aspects, transits} = fortune;

  let love = score, career = score, wealth = score, health = score;

  for (const a of aspects) {
    const s = a.score * 3;
    if (a.planet === 'venus' || a.planet === 'moon') love += s * 2;
    if (a.planet === 'saturn' || a.planet === 'jupiter' || a.planet === 'sun') career += s * 2;
    if (a.planet === 'jupiter' || a.planet === 'venus') wealth += s * 2;
    if (a.planet === 'mars' || a.planet === 'saturn') health += s;
  }

  // Venus house bonus for love
  for (const t of transits) {
    if (t.planet === 'venus' && [1,5,7].includes(t.house)) love += 8;
    if (t.planet === 'jupiter' && [2,6,10].includes(t.house)) wealth += 8;
    if (t.planet === 'sun' && [1,10].includes(t.house)) career += 8;
    if (t.planet === 'mars' && [6,12].includes(t.house)) health -= 5;
  }

  const clamp = v => Math.max(20, Math.min(95, Math.round(v)));
  return {
    love: clamp(love),
    career: clamp(career),
    wealth: clamp(wealth),
    health: clamp(health)
  };
}

// Generate text descriptions from transits
function genTransitText(fortune, signKey) {
  const {transits, aspects} = fortune;
  let texts = [];

  // Most important transits (by planet weight)
  const sorted = [...transits].sort((a,b) => (PLANET_WEIGHT[b.planet]||0) - (PLANET_WEIGHT[a.planet]||0));

  for (let i = 0; i < Math.min(4, sorted.length); i++) {
    const t = sorted[i];
    const desc = TRANSIT[t.planet] && TRANSIT[t.planet][t.house];
    if (desc) texts.push(desc);
  }

  return texts;
}

// Lucky items derived from planetary positions
function genLucky(fortune, signIdx, date) {
  const {transits} = fortune;
  const dayOfYear = Math.floor((date - new Date(date.getFullYear(),0,0)) / 86400000);

  const colors = ['红色','橙色','金色','绿色','蓝色','紫色','银色','白色','粉色','黑色','棕色','青色'];
  const directions = ['正东','东南','正南','西南','正西','西北','正北','东北'];

  // Venus position influences lucky color
  const venusSign = transits.find(t => t.planet === 'venus');
  const colorIdx = venusSign ? (venusSign.sign + Math.floor(venusSign.deg / 5) + signIdx) % colors.length : (dayOfYear + signIdx) % colors.length;

  // Jupiter position influences lucky number
  const jupSign = transits.find(t => t.planet === 'jupiter');
  const luckyNum = jupSign ? ((Math.floor(jupSign.deg) + signIdx * 3 + dayOfYear) % 9) + 1 : ((dayOfYear + signIdx) % 9) + 1;

  // Mars influences direction
  const marsSign = transits.find(t => t.planet === 'mars');
  const dirIdx = marsSign ? (marsSign.sign + signIdx) % directions.length : (dayOfYear + signIdx) % directions.length;

  return {
    color: colors[colorIdx],
    number: luckyNum,
    direction: directions[dirIdx]
  };
}

// Fortune levels
function fortuneLevel(score) {
  if (score >= 85) return {level:'大吉',color:'#2ecc71',stars:5};
  if (score >= 72) return {level:'吉',color:'#D4AF37',stars:4};
  if (score >= 55) return {level:'中',color:'#f39c12',stars:3};
  if (score >= 40) return {level:'平',color:'#95a5a6',stars:2};
  return {level:'凶',color:'#e74c3c',stars:1};
}

      mid:['感情运势平稳，重要的是保持真诚的沟通。','感情方面不急不躁，用心经营当下的关系。','平淡中蕴含温馨，珍惜身边人的陪伴。'],
      low:['感情上可能遇到一些摩擦，需要更多耐心和理解。','避免因小事引发争执，学会退一步海阔天空。','感情需要经营，不要把压力转嫁给伴侣。']
    },
    career: {

      low:['工作压力较大，需要合理分配精力和时间。','注意职场沟通，避免因表达不当造成误解。','调整工作节奏，不要强行推进遇到阻力的事务。']
    },
    wealth: {
      high:['财运亨通，收入和理财都有利好迹象。','适合适度投资和拓展收入渠道。','可能收到意外之财或财务方面的好消息。'],
      mid:['财务状况平稳，量入为出是明智之举。','理性消费，避免不必要的大额支出。','财运一般，不适合高风险投资。'],

  const pool = texts[dim] || texts.career;
  const level = score >= 70 ? 'high' : score >= 45 ? 'mid' : 'low';

  return arr[signIdx % arr.length];

function renderPowerDays(signIdx, period, now) {
  const days = period === 'week' ? 7 : 30;
  const results = [];

  for (let i = 0; i < days; i++) {
    const d = new Date(now.getTime() + i * 86400000);
    const f = calcFortune(signIdx, d);
    results.push({date:d, score:f.score});
  }

  // Find top 3 and bottom 2
  const sorted = [...results].sort((a,b) => b.score - a.score);
  const top3 = sorted.slice(0, 3);
  const bottom2 = sorted.slice(-2).reverse();

  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  const weekday = d => ['日','一','二','三','四','五','六'][d.getDay()];

  let html = `<div class="power-days" style="margin-top:16px">
    <div style="font-size:0.85em;color:var(--gold);margin-bottom:8px;font-family:'kai',serif">吉日与注意日</div>`;

  for (const d of top3) {
    html += `<div class="day-item">
      <div class="day-dot good"></div>
      <span class="day-date">${fmt(d.date)} 周${weekday(d.date)}</span>
      <span style="color:#2ecc71;font-size:0.8em">吉 ${d.score}分</span>
    </div>`;
  }
  for (const d of bottom2) {
    html += `<div class="day-item">
      <div class="day-dot caution"></div>
      <span class="day-date">${fmt(d.date)} 周${weekday(d.date)}</span>
      <span style="color:#e74c3c;font-size:0.8em">慎 ${d.score}分</span>
    </div>`;
  }

  html += '</div>';
  return html;
}

function initStarCanvas() {
  const canvas = document.getElementById('starCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, stars = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Create stars
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.02,
      dy: Math.random() * 0.15 + 0.02
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    for (const s of stars) {
      s.a += s.da;
      if (s.a > 1 || s.a < 0.1) s.da = -s.da;
      s.y -= s.dy;
      if (s.y < -5) { s.y = h + 5; s.x = Math.random() * w; }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212,175,55,${s.a * 0.5})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
}
